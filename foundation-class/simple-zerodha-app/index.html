<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zerodha</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      ul li {
        list-style: none;
      }
      ul li a {
        text-decoration: none;
        color: gray;
      }
    </style>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 50px;
        box-shadow: 2px 1px 2px #eee;
        position: sticky;
      "
    >
      <img src="/foundation-class/images/logo.svg" alt="zerodha logo" width="150" height="20" />
      <ul style="display: flex; gap: 30px">
        <li><a href="#">Signup</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Pricing</a></li>
        <li><a href="#">Products</a></li>
        <li><a href="#">Support</a></li>
      </ul>
    </div>
    <div style="display: flex; flex-direction: column; align-items: center">
      <img src="/foundation-class/images/landing.svg" alt="zerodha landing image" height="400" />
      <div
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 15px;
          margin-top: 20px;
        "
      >
        <h1>Invest in everything</h1>
        <h2 style="font-weight: 500">
          Online platform to invest in stocks, derivations, mutual funds, ETFs,
          bonds, and more
        </h2>
      </div>
      <button
        style="
          background-color: rgb(0, 153, 255);
          color: whitesmoke;
          padding: 10px 30px;
          border-radius: 5px;
          border: none;
          margin-top: 40px;
          font-size: 20px;
          cursor: pointer;
          font-weight: 100;
        "
      >
        Signup for free
      </button>
    </div>
  </body>
</html>
